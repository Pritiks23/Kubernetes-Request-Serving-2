apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: inference
data:
  # Model to load. No HF token required for any of these:
  #   facebook/opt-125m        (~250MB, default — fastest)
  #   facebook/opt-350m        (~700MB)
  #   TinyLlama/TinyLlama-1.1B-Chat-v1.0  (~2.2GB — may OOM on 8GB Codespace)
  MODEL_ID: "facebook/opt-125m"
