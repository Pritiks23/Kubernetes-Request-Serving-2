apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: inference
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - "--model"
            - "$(MODEL_ID)"
            - "--device"
            - "cpu"
            - "--port"
            - "8000"
            - "--dtype"
            - "float32"
            - "--max-model-len"
            - "512"
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: vllm-config
                  key: MODEL_ID
            # Tell Hugging Face to cache weights inside the container
            - name: HF_HOME
              value: /tmp/hf-cache
            # Disable tokenizer parallelism warnings on CPU
            - name: TOKENIZERS_PARALLELISM
              value: "false"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "1"
              memory: "3Gi"
            limits:
              cpu: "2"
              memory: "5Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            # Model download + load takes a while on first run
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: hf-cache
              mountPath: /tmp/hf-cache
      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: 2Gi
