apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: inference
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
    spec:
      containers:
        - name: gateway
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: gateway-config
          configMap:
            name: gateway-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: inference
data:
  default.conf: |
    upstream router_backend {
      server inference-router-service:80;
    }
    server {
      listen 80;
      # Rate limiting
      limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

      location /v1 {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://router_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Gateway "gpu-inference-platform" always;
      }
      location /health {
        return 200 '{"status":"ok","service":"api-gateway"}';
        add_header Content-Type application/json;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: inference
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
